# Trail Marker config. Lines starting with # or ; are comments.  key = value
# Place next to TrailMarker.asi in the RDR2 game folder. Read once at game launch.

sampleIntervalMs  = 1000     # how often to check position (real time, framerate-independent)
movementThreshold = 3.0      # record a point after moving this many world units since the last one
keepaliveSeconds  = 45       # record at least this often even while stationary (flagged keepalive)
flushSeconds      = 30       # flush buffered records to disk this often

# outputPath = C:\some\path\TrailMarker.bin   # default: TrailMarker.bin next to TrailMarker.asi
