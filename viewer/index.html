<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trail Marker — Viewer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body { margin: 0; height: 100%; background: #11140f; font-family: system-ui, sans-serif; }
  #map { position: absolute; inset: 0; background: #11140f; }
  #panel {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(20,22,16,.88); color: #e8e2d0; padding: 12px 14px;
    border: 1px solid #6b5d3e; border-radius: 6px; font-size: 13px; max-width: 280px;
  }
  #panel h1 { font-size: 15px; margin: 0 0 6px; letter-spacing: .04em; }
  #panel .hint { color: #b3a982; }
  #stats { margin-top: 8px; line-height: 1.5; }
  #legend { margin-top: 8px; padding-top: 8px; border-top: 1px solid #4a4128; display: none; }
  #legend span { display: inline-block; margin: 2px 6px 2px 0; }
  #legend i { display: inline-block; width: 11px; height: 11px; border-radius: 2px; vertical-align: middle; margin-right: 3px; }
  #drop { position: absolute; inset: 0; z-index: 1500; display: none; background: rgba(10,12,8,.7);
    color: #ffe; align-items: center; justify-content: center; font-size: 22px; border: 3px dashed #c9b277; pointer-events: none; }
  #drop.show { display: flex; }
  .leaflet-container { background: #11140f; }
  /* One GPU drop-shadow over the whole vector pane = a dark halo behind every track/marker so
     colored lines stay legible on light terrain. No extra geometry, unlike a per-line casing. */
  .leaflet-overlay-pane svg { filter: drop-shadow(0 0 1.5px rgba(0,0,0,.95)); }
  #hover {
    position: absolute; z-index: 1200; display: none; pointer-events: none;
    background: rgba(20,22,16,.94); color: #e8e2d0; border: 1px solid #6b5d3e;
    border-radius: 5px; padding: 7px 9px; font-size: 12px; line-height: 1.45;
    font-family: ui-monospace, monospace; max-width: 240px;
  }
  #hover b { color: #e8c25a; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h1>🤠 Trail Marker</h1>
  <div class="hint">Drag a <code>TrailMarker.bin</code> onto the page, or:</div>
  <input id="file" type="file" accept=".bin" />
  <div id="sample-note" class="hint" style="display:none; margin-top:6px;">
    Showing <strong>sample data</strong> — drop your own <code>TrailMarker.bin</code> to replace it.
  </div>
  <div style="margin-top:8px;">Color by:
    <select id="colormode">
      <option value="transport">Transport</option>
      <option value="honor">Honor</option>
      <option value="cash">Money</option>
      <option value="combat">Combat</option>
    </select>
  </div>
  <div style="margin-top:6px;">
    <label><input type="checkbox" id="f-cutscene"> hide cutscenes</label><br>
    <label><input type="checkbox" id="f-orphan"> hide post-reload branches</label><br>
    <label><input type="checkbox" id="f-teleport" checked> show fast-travel jumps</label>
  </div>
  <div id="stats"></div>
  <div id="legend"></div>
</div>
<div id="drop">Drop TrailMarker.bin to load</div>
<div id="hover"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// --- Game-world -> map (Leaflet CRS.Simple) transform -------------------------
// Canonical Jean Ropke transform for the s.rsg.sc RDR2 tiles (the same CRS/bounds/zoom this
// map uses): a single isotropic scale + offset. lat from game Y (north), lng from game X
// (east). This matches the reference collectors map, so it needs no hand-calibration.
const CAL = { s: 0.01552, offLat: -63.6, offLng: 111.29 };
const gameToLatLng = (x, y) => [ CAL.s * y + CAL.offLat, CAL.s * x + CAL.offLng ];

// --- Transport palette --------------------------------------------------------
const T = {
  0: ['foot',    '#9aa0a6'], 1: ['horse',   '#c8924a'], 2: ['boat',    '#3d8bd4'],
  3: ['train',   '#c0c4cc'], 4: ['balloon', '#b06bd6'], 5: ['swim',    '#36cfd0'],
  6: ['other',   '#e0863a'],
};
const F_SEGMENT_START = 0x20, F_DEAD = 0x10, F_COMBAT = 0x04;
const TELEPORT_UNITS = 300; // jumps larger than this between points = fast-travel/teleport, not real travel
const CLOCKSET_MAX_MOVE = 30; // a backward time jump with under this much movement = stayed in place (see computeDeaths)
const FLAG_NAMES = ['non-gameplay', 'keepalive', 'combat', 'wanted', 'dead', 'segment_start', 'orphaned'];
const flagNames = f => FLAG_NAMES.filter((_, i) => f & (1 << i)).join(', ') || 'none';

// In-game time: seconds since in-game 1800-01-01 -> "YYYY-MM-DD HH:MM"
function daysFromCivil(y, m, d) {
  y -= m <= 2 ? 1 : 0;
  const era = Math.floor((y >= 0 ? y : y - 399) / 400), yoe = y - era * 400;
  const doy = Math.floor((153 * (m + (m > 2 ? -3 : 9)) + 2) / 5) + d - 1;
  return era * 146097 + (yoe * 365 + Math.floor(yoe / 4) - Math.floor(yoe / 100) + doy) - 719468;
}
function civilFromDays(z) {
  z += 719468;
  const era = Math.floor((z >= 0 ? z : z - 146096) / 146097), doe = z - era * 146097;
  const yoe = Math.floor((doe - Math.floor(doe / 1460) + Math.floor(doe / 36524) - Math.floor(doe / 146096)) / 365);
  const y = yoe + era * 400, doy = doe - (365 * yoe + Math.floor(yoe / 4) - Math.floor(yoe / 100));
  const mp = Math.floor((5 * doy + 2) / 153), d = doy - Math.floor((153 * mp + 2) / 5) + 1, m = mp < 10 ? mp + 3 : mp - 9;
  return [y + (m <= 2 ? 1 : 0), m, d];
}
const DAYS_1800 = daysFromCivil(1800, 1, 1);
const p2 = n => String(n).padStart(2, '0');
function fmtTime(t) {
  const [y, m, d] = civilFromDays(Math.floor(t / 86400) + DAYS_1800), sod = t % 86400;
  return `${y}-${p2(m)}-${p2(d)} ${p2(Math.floor(sod / 3600))}:${p2(Math.floor(sod % 3600 / 60))}`;
}

// --- Coloring modes -----------------------------------------------------------
function dataRanges(recs) {
  const R = { hMin: 1e9, hMax: -1e9, cMin: 1e9, cMax: -1e9 };
  for (const r of recs) {
    R.hMin = Math.min(R.hMin, r.honor); R.hMax = Math.max(R.hMax, r.honor);
    R.cMin = Math.min(R.cMin, r.cash);  R.cMax = Math.max(R.cMax, r.cash);
  }
  return R;
}
const qnorm = (v, min, max) => max <= min ? 0.5 : Math.round((v - min) / (max - min) * 24) / 24; // quantized 0..1
const ramp = (t, h0, h1) => `hsl(${(h0 + (h1 - h0) * t).toFixed(0)},72%,52%)`;
function colorOf(r, mode, R) {
  switch (mode) {
    case 'honor':  return ramp(qnorm(r.honor, R.hMin, R.hMax), 0, 120);   // red (low) -> green (high)
    case 'cash':   return ramp(qnorm(r.cash, R.cMin, R.cMax), 210, 0);    // blue (low) -> red (high)
    case 'combat': return (r.flags & 0x04) ? '#ff3b3b' : '#5a6b3a';
    default:       return (T[r.transport] || ['', '#fff'])[1];            // transport
  }
}
function renderLegend(mode, seenT, R) {
  const lg = document.getElementById('legend');
  if (mode === 'transport')
    lg.innerHTML = [...seenT].sort((a, b) => a - b).map(t => `<span><i style="background:${(T[t] || ['', '#fff'])[1]}"></i>${(T[t] || ['?'])[0]}</span>`).join('');
  else if (mode === 'combat')
    lg.innerHTML = `<span><i style="background:#ff3b3b"></i>in combat</span> <span><i style="background:#5a6b3a"></i>peaceful</span>`;
  else {
    const [lo, hi, h0, h1, label] = mode === 'honor' ? [R.hMin, R.hMax, 0, 120, 'honor']
      : [R.cMin, R.cMax, 210, 0, 'cash $'];
    const grad = `linear-gradient(to right, ${ramp(0, h0, h1)}, ${ramp(.5, h0, h1)}, ${ramp(1, h0, h1)})`;
    lg.innerHTML = `${label}: ${lo} <span style="display:inline-block;width:90px;height:11px;border-radius:2px;vertical-align:middle;background:${grad}"></span> ${hi}`;
  }
  lg.style.display = 'block';
}

// --- Map ----------------------------------------------------------------------
const mapBounds = L.latLngBounds(L.latLng(-144, 0), L.latLng(0, 176));
const map = L.map('map', { crs: L.CRS.Simple, minZoom: 2, maxZoom: 7 });
L.tileLayer('https://s.rsg.sc/sc/images/games/RDR2/map/game/{z}/{x}/{y}.jpg', {
  minZoom: 2, maxZoom: 7, bounds: mapBounds, noWrap: true,
  attribution: 'Map © <a href="https://www.rockstargames.com/">Rockstar Games</a> · tiles via Jean Ropke'
}).addTo(map);
map.setView([-72, 88], 3);

let lastData = null, pathLayer = null, hoverPts = [];

// --- Binary parsing -----------------------------------------------------------
function parseBin(buf) {
  const dv = new DataView(buf);
  const magic = String.fromCharCode(dv.getUint8(0), dv.getUint8(1), dv.getUint8(2), dv.getUint8(3));
  if (magic !== 'R2GP') throw new Error('Not a Trail Marker file (bad magic "' + magic + '")');
  const version = dv.getUint16(4, true), recordSize = dv.getUint16(6, true);
  const recs = [];
  for (let off = 8; off + recordSize <= buf.byteLength; off += recordSize) {
    recs.push({
      t: dv.getUint32(off, true),
      x: dv.getInt16(off + 4, true) / 2, y: dv.getInt16(off + 6, true) / 2, z: dv.getInt16(off + 8, true) / 2,
      transport: dv.getUint8(off + 10), flags: dv.getUint8(off + 11),
      honor: dv.getInt8(off + 12), character: dv.getUint8(off + 13),
      cash: dv.getUint32(off + 14, true),
    });
  }
  return { version, recordSize, recs };
}

// --- Render: one polyline per transport-run, split across sessions ------------
// Records abandoned by a later savegame load: at each segment_start (a load/launch) with
// in-game time T, the contiguous run of prior records with time > T is the abandoned future.
// (Deaths also rewind time but carry no segment_start, so respawns are never orphaned.)
function computeOrphans(recs) {
  const orph = new Array(recs.length).fill(false);
  for (let i = 1; i < recs.length; i++) {
    if (recs[i].flags & F_SEGMENT_START) {
      const T = recs[i].t;
      for (let j = i - 1; j >= 0 && !orph[j]; j--) {
        if (recs[j].t > T) orph[j] = true; else break; // reached the branch point
      }
    }
  }
  return orph;
}

// Death locations, unified into one marker per death from two signals:
//  - F_DEAD: the exact spot the game reported dead/dying — best-effort, catches ~half of
//    deaths (the window is brief).
//  - respawn-rewind: in-game time jumps backward with NO segment_start. A reload also rewinds
//    time but carries a segment_start, so this excludes reloads; the spot is the last record
//    before the rewind.
// Most deaths respawn, so rewinds are the main list: we mark a nearby F_DEAD spot (exact) or
// fall back to the pre-rewind record (approximate). But a death with NO following respawn —
// you died then quit, or loaded an earlier save (masked as a reload) — leaves only its F_DEAD
// flag, so we also emit any dead flag the rewind pass didn't already claim. De-duped so a
// normal death isn't marked twice.
//
// Caveat the rewind signal alone can't resolve: a story mission that needs a particular time of
// day ALSO rewinds the clock backward (always to a round hour) with no segment_start — looks
// exactly like a respawn by the time jump. The tell is movement: a death respawns you at a
// doctor/camp/checkpoint (a real position warp), while a mission clock-set leaves you standing
// where you are. So we suppress a rewind only when it has NO death evidence at all — no F_DEAD
// in the dying-run window, no combat at the rewind, and you barely moved. Any warp keeps the
// marker, so non-combat deaths (a fall, a train, drowning — all of which still respawn you
// elsewhere) survive. We deliberately do NOT trust the cutscene flag here: it can't tell a
// story cutscene from the death camera (both are "non-gameplay camera"), and it was inert across
// a whole real death-containing session, whereas the position warp held up in every log.
// Verified against real logs: clears RDR2's opening-chapter phantom deaths without dropping a
// single F_DEAD- or warp-confirmed death.
function computeDeaths(recs) {
  const out = [], claimed = new Set();
  for (let i = 1; i < recs.length; i++) {
    if (recs[i].flags & F_SEGMENT_START) continue;             // reload, not a death
    if (!(recs[i].t > 0) || recs[i].t >= recs[i - 1].t) continue; // need a backward time jump
    if (recs[i - 1].t - recs[i].t < 5) continue;              // ignore sub-sample jitter
    let k = -1;                                                // nearest F_DEAD before the rewind
    for (let j = i - 1; j >= 0 && j >= i - 6; j--)             // claim the whole dying-run in the window
      if (recs[j].flags & F_DEAD) { if (k < 0) k = j; claimed.add(j); }
    const combat = (recs[i - 1].flags & F_COMBAT) || (recs[i].flags & F_COMBAT);
    const moved = Math.hypot(recs[i].x - recs[i - 1].x, recs[i].y - recs[i - 1].y);
    if (k < 0 && !combat && moved <= CLOCKSET_MAX_MOVE) continue; // mission clock-set, not a death
    out.push({ idx: k >= 0 ? k : i - 1, exact: k >= 0 });
  }
  // Unclaimed dead flags = deaths with no respawn after them. One marker per dying-run.
  for (let i = 0; i < recs.length; i++) {
    if (!(recs[i].flags & F_DEAD) || (i > 0 && (recs[i - 1].flags & F_DEAD))) continue; // run start only
    let claimedRun = false;
    for (let j = i; j < recs.length && (recs[j].flags & F_DEAD); j++) if (claimed.has(j)) { claimedRun = true; break; }
    if (!claimedRun) out.push({ idx: i, exact: true });
  }
  return out;
}

function render(data, doFit) {
  lastData = data;
  if (pathLayer) { map.removeLayer(pathLayer); pathLayer = null; }
  const { recs, version } = data;
  const mode = document.getElementById('colormode').value;
  const R = dataRanges(recs);
  const exCut = document.getElementById('f-cutscene').checked;
  const showJumps = document.getElementById('f-teleport').checked;
  const orph = document.getElementById('f-orphan').checked ? computeOrphans(recs) : null;

  const lines = [], deaths = [], teleports = [];
  hoverPts = [];
  let run = [], runC = null, prevLL = null, pgx = null, pgy = null, pgt = null, kept = 0;
  // Contrast against light terrain comes from a single drop-shadow on the whole vector pane
  // (see CSS), so each run is just one polyline — no geometry doubling.
  const flush = () => { if (run.length > 1) lines.push(L.polyline(run, { color: runC, weight: 2.4, opacity: .95 })); };
  const seenT = new Set();
  for (let i = 0; i < recs.length; i++) {
    const r = recs[i];
    if ((exCut && (r.flags & 0x01)) || (orph && orph[i])) { flush(); run = []; runC = null; prevLL = null; pgx = null; pgt = null; continue; }
    const ll = gameToLatLng(r.x, r.y);
    const col = colorOf(r, mode, R);
    // A death respawn rewinds in-game time and warps you elsewhere — often a short hop the
    // spatial threshold misses. It isn't travel, so break the track there too and draw no
    // connector (the death marker already shows it), else we'd render a straight death->respawn line.
    const respawn = prevLL && pgt !== null && r.t < pgt && !(r.flags & F_SEGMENT_START);
    const teleport = prevLL && pgx !== null && Math.hypot(r.x - pgx, r.y - pgy) > TELEPORT_UNITS;
    if ((r.flags & F_SEGMENT_START) || teleport || respawn) {               // session boundary, fast-travel jump, or respawn
      flush();
      if (teleport && !respawn && showJumps) teleports.push(L.polyline([prevLL, ll], { color: '#9a9a9a', weight: 1, opacity: .5, dashArray: '4 7' }));
      run = [ll]; runC = col;
    } else if (col !== runC) { flush(); run = prevLL ? [prevLL, ll] : [ll]; runC = col; } // color change: connect
    else run.push(ll);
    hoverPts.push({ lat: ll[0], lng: ll[1], r });
    prevLL = ll; pgx = r.x; pgy = r.y; pgt = r.t; seenT.add(r.transport); kept++;
  }
  flush();

  // Death markers: exact (F_DEAD) drawn solid, inferred (respawn-rewind) hollow/dashed.
  for (const d of computeDeaths(recs)) {
    if ((exCut && (recs[d.idx].flags & 0x01)) || (orph && orph[d.idx])) continue; // hidden by a filter
    const ll = gameToLatLng(recs[d.idx].x, recs[d.idx].y);
    // Inferred spots (respawn-rewind, no dead flag) are normally within a sample of the real
    // death spot, so they share the exact marker's look; the tooltip keeps the distinction.
    deaths.push(L.circleMarker(ll, { radius: 6, color: '#ff3b3b', weight: 2, fillColor: '#7a0000', fillOpacity: .85 })
      .bindTooltip(d.exact ? '💀 died here' : '💀 died here (approx)'));
  }
  // Marker at the most recent point — where you left off.
  const last = recs[recs.length - 1];
  const lastMarker = last ? L.circleMarker(gameToLatLng(last.x, last.y),
    { radius: 6, color: '#e8c25a', weight: 2, fillColor: '#caa233', fillOpacity: .9 }).bindTooltip('📍 last position') : null;
  pathLayer = L.layerGroup([...teleports, ...lines, ...deaths, ...(lastMarker ? [lastMarker] : [])]).addTo(map);

  if (doFit && hoverPts.length) map.fitBounds(L.latLngBounds(hoverPts.map(p => [p.lat, p.lng])), { padding: [40, 40], maxZoom: 6 });

  const sessions = recs.filter(r => r.flags & F_SEGMENT_START).length || (recs.length ? 1 : 0);
  document.getElementById('stats').innerHTML =
    `<b>${kept.toLocaleString()}</b>/${recs.length.toLocaleString()} pts · <b>${sessions}</b> session(s) · <b>${deaths.length}</b> 💀 · v${version}`;
  renderLegend(mode, seenT, R);
}

// --- Hover: show the nearest recorded point's details -------------------------
const CHARS = ['Arthur', 'John', 'other'];
const hoverBox = document.getElementById('hover');
let lastEvt = null, rafPending = false;
map.on('mousemove', e => { lastEvt = e; if (!rafPending) { rafPending = true; requestAnimationFrame(showHover); } });
map.on('mouseout', () => { hoverBox.style.display = 'none'; });
function showHover() {
  rafPending = false;
  if (!lastEvt || !hoverPts.length) return;
  const { lat, lng } = lastEvt.latlng;
  let best = null, bestD = Infinity;
  for (const p of hoverPts) { const dx = p.lng - lng, dy = p.lat - lat, d = dx * dx + dy * dy; if (d < bestD) { bestD = d; best = p; } }
  if (!best || map.latLngToContainerPoint([best.lat, best.lng]).distanceTo(lastEvt.containerPoint) > 18) {
    hoverBox.style.display = 'none'; return;
  }
  const r = best.r;
  hoverBox.innerHTML =
    `<b>${fmtTime(r.t)}</b><br>` +
    `${(T[r.transport] || ['?'])[0]} · honor ${r.honor} · $${r.cash}<br>` +
    `${CHARS[r.character] || 'char?'} · game (${r.x.toFixed(0)}, ${r.y.toFixed(0)})<br>` +
    `flags: ${flagNames(r.flags)}`;
  hoverBox.style.display = 'block';
  hoverBox.style.left = (lastEvt.containerPoint.x + 14) + 'px';
  hoverBox.style.top = (lastEvt.containerPoint.y + 14) + 'px';
}

// --- File loading -------------------------------------------------------------
function loadFile(file) {
  const fr = new FileReader();
  fr.onload = () => {
    try { render(parseBin(fr.result), true); document.getElementById('sample-note').style.display = 'none'; }
    catch (e) { alert(e.message); }
  };
  fr.readAsArrayBuffer(file);
}
document.getElementById('file').addEventListener('change', e => e.target.files[0] && loadFile(e.target.files[0]));
['colormode', 'f-cutscene', 'f-orphan', 'f-teleport'].forEach(id =>
  document.getElementById(id).addEventListener('change', () => { if (lastData) render(lastData, false); }));
const drop = document.getElementById('drop');
window.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('show'); });
window.addEventListener('dragleave', e => { if (e.clientX <= 0 || e.clientY <= 0) drop.classList.remove('show'); });
window.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('show'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

// Show the bundled sample on load so a first-time visitor sees a trail immediately.
// Best-effort: fetch fails for file:// in most browsers, so we just leave the empty
// map (and the drag-to-load prompt) in that case.
fetch('TrailMarker.bin')
  .then(r => { if (!r.ok) throw new Error('no sample'); return r.arrayBuffer(); })
  .then(buf => { render(parseBin(buf), true); document.getElementById('sample-note').style.display = ''; })
  .catch(() => {});
</script>
</body>
</html>
