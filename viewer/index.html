<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trail Marker — Viewer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body { margin: 0; height: 100%; background: #11140f; font-family: system-ui, sans-serif; }
  #map { position: absolute; inset: 0; background: #11140f; }
  #panel {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(20,22,16,.88); color: #e8e2d0; padding: 12px 14px;
    border: 1px solid #6b5d3e; border-radius: 6px; font-size: 13px; max-width: 280px;
  }
  #panel h1 { font-size: 15px; margin: 0 0 6px; letter-spacing: .04em; }
  #panel .hint { color: #b3a982; }
  #stats { margin-top: 8px; line-height: 1.5; }
  #legend { margin-top: 8px; padding-top: 8px; border-top: 1px solid #4a4128; display: none; }
  #legend span { display: inline-block; margin: 2px 6px 2px 0; }
  #legend i { display: inline-block; width: 11px; height: 11px; border-radius: 2px; vertical-align: middle; margin-right: 3px; }
  #drop { position: absolute; inset: 0; z-index: 1500; display: none; background: rgba(10,12,8,.7);
    color: #ffe; align-items: center; justify-content: center; font-size: 22px; border: 3px dashed #c9b277; pointer-events: none; }
  #drop.show { display: flex; }
  .leaflet-container { background: #11140f; }
  /* One GPU drop-shadow over the whole vector pane = a dark halo behind every track/marker so
     colored lines stay legible on light terrain. No extra geometry, unlike a per-line casing. */
  .leaflet-overlay-pane svg { filter: drop-shadow(0 0 1.5px rgba(0,0,0,.95)); }
  /* Replay draws in its own pane above the track; the same halo keeps it legible. While a replay
     is in progress we fade the static track so the growing colored trail reads as "where I've been". */
  .leaflet-replay-pane svg { filter: drop-shadow(0 0 1.5px rgba(0,0,0,.95)); }
  .replaying .leaflet-overlay-pane { opacity: .3; transition: opacity .25s; }
  #hover {
    position: absolute; z-index: 1200; display: none; pointer-events: none;
    background: rgba(20,22,16,.94); color: #e8e2d0; border: 1px solid #6b5d3e;
    border-radius: 5px; padding: 7px 9px; font-size: 12px; line-height: 1.45;
    font-family: ui-monospace, monospace; max-width: 240px;
  }
  #hover b { color: #e8c25a; }
  #replay {
    position: absolute; left: 50%; transform: translateX(-50%); bottom: 16px; z-index: 1100;
    display: none; align-items: center; gap: 10px; width: min(620px, calc(100% - 32px));
    background: rgba(20,22,16,.92); color: #e8e2d0; padding: 9px 13px;
    border: 1px solid #6b5d3e; border-radius: 8px; font-size: 13px;
  }
  #replay.show { display: flex; }
  #replay button {
    flex: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
    border: 1px solid #6b5d3e; background: #2a2c20; color: #e8c25a; font-size: 15px; line-height: 1;
  }
  #replay button:hover { background: #353826; }
  #rp-scrub { flex: 1 1 auto; min-width: 60px; accent-color: #caa233; cursor: pointer; }
  #rp-speed { flex: none; background: #2a2c20; color: #e8e2d0; border: 1px solid #6b5d3e; border-radius: 4px; padding: 3px 4px; }
  #rp-clock { flex: none; min-width: 196px; text-align: right; font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.35; }
  #rp-clock b { color: #e8c25a; }
  #rp-clock .sub { color: #b3a982; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h1>🤠 Trail Marker</h1>
  <div class="hint">Drag a <code>TrailMarker.bin</code> onto the page, or:</div>
  <input id="file" type="file" accept=".bin" />
  <div id="sample-note" class="hint" style="display:none; margin-top:6px;">
    Showing <strong>sample data</strong> — drop your own <code>TrailMarker.bin</code> to replace it.
  </div>
  <div style="margin-top:8px;">Color by:
    <select id="colormode">
      <option value="transport">Transport</option>
      <option value="honor">Honor</option>
      <option value="cash">Money</option>
      <option value="combat">Combat</option>
    </select>
  </div>
  <div style="margin-top:6px;">
    <label><input type="checkbox" id="f-cutscene"> hide cutscenes</label><br>
    <label><input type="checkbox" id="f-mission"> hide mission travel</label><br>
    <label><input type="checkbox" id="f-orphan" checked> hide post-reload branches</label><br>
    <label><input type="checkbox" id="f-teleport" checked> hide fast-travel jumps</label>
  </div>
  <div id="stats"></div>
  <div id="legend"></div>
</div>
<div id="drop">Drop TrailMarker.bin to load</div>
<div id="hover"></div>
<div id="replay">
  <button id="rp-play" title="Play / pause replay (space)">▶</button>
  <input id="rp-scrub" type="range" min="0" max="0" value="0" step="1" />
  <select id="rp-speed" title="Replay speed (points per second)">
    <option value="20">1×</option>
    <option value="40" selected>2×</option>
    <option value="80">4×</option>
    <option value="160">8×</option>
  </select>
  <div id="rp-clock"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// --- Game-world -> map (Leaflet CRS.Simple) transform -------------------------
// Canonical Jean Ropke transform for the s.rsg.sc RDR2 tiles (the same CRS/bounds/zoom this
// map uses): a single isotropic scale + offset. lat from game Y (north), lng from game X
// (east). This matches the reference collectors map, so it needs no hand-calibration.
const CAL = { s: 0.01552, offLat: -63.6, offLng: 111.29 };
const gameToLatLng = (x, y) => [ CAL.s * y + CAL.offLat, CAL.s * x + CAL.offLng ];

// --- Transport palette --------------------------------------------------------
const T = {
  0: ['foot',    '#9aa0a6'], 1: ['horse',   '#c8924a'], 2: ['boat',    '#3d8bd4'],
  3: ['train',   '#c0c4cc'], 4: ['balloon', '#b06bd6'], 5: ['swim',    '#36cfd0'],
  6: ['other',   '#e0863a'],
};
const F_SEGMENT_START = 0x20, F_DEAD = 0x10, F_COMBAT = 0x04, F_NONGAMEPLAY = 0x01, F_MISSION = 0x80;
const TELEPORT_UNITS = 300; // jumps larger than this between points = fast-travel/teleport, not real travel
const CLOCKSET_MAX_MOVE = 30; // a backward time jump with under this much movement = stayed in place (see computeDeaths)
const CUTSCENE_RUN = 3; // consecutive non-gameplay records that mark a sustained cutscene, not a death's brief fade
const TRIP_TIME_CAP = 1800; // replay trip clock: count gaps up to 30 game-min as "lived"; longer = a mission time-skip
const FLAG_NAMES = ['non-gameplay', 'keepalive', 'combat', 'wanted', 'dead', 'segment_start', 'orphaned', 'mission'];
const flagNames = f => FLAG_NAMES.filter((_, i) => f & (1 << i)).join(', ') || 'none';

// In-game time: seconds since in-game 1800-01-01 -> "YYYY-MM-DD HH:MM"
function daysFromCivil(y, m, d) {
  y -= m <= 2 ? 1 : 0;
  const era = Math.floor((y >= 0 ? y : y - 399) / 400), yoe = y - era * 400;
  const doy = Math.floor((153 * (m + (m > 2 ? -3 : 9)) + 2) / 5) + d - 1;
  return era * 146097 + (yoe * 365 + Math.floor(yoe / 4) - Math.floor(yoe / 100) + doy) - 719468;
}
function civilFromDays(z) {
  z += 719468;
  const era = Math.floor((z >= 0 ? z : z - 146096) / 146097), doe = z - era * 146097;
  const yoe = Math.floor((doe - Math.floor(doe / 1460) + Math.floor(doe / 36524) - Math.floor(doe / 146096)) / 365);
  const y = yoe + era * 400, doy = doe - (365 * yoe + Math.floor(yoe / 4) - Math.floor(yoe / 100));
  const mp = Math.floor((5 * doy + 2) / 153), d = doy - Math.floor((153 * mp + 2) / 5) + 1, m = mp < 10 ? mp + 3 : mp - 9;
  return [y + (m <= 2 ? 1 : 0), m, d];
}
const DAYS_1800 = daysFromCivil(1800, 1, 1);
const p2 = n => String(n).padStart(2, '0');
function fmtTime(t) {
  const [y, m, d] = civilFromDays(Math.floor(t / 86400) + DAYS_1800), sod = t % 86400;
  return `${y}-${p2(m)}-${p2(d)} ${p2(Math.floor(sod / 3600))}:${p2(Math.floor(sod % 3600 / 60))}`;
}

// --- Coloring modes -----------------------------------------------------------
function dataRanges(recs) {
  const R = { hMin: 1e9, hMax: -1e9, cMin: 1e9, cMax: -1e9 };
  for (const r of recs) {
    R.hMin = Math.min(R.hMin, r.honor); R.hMax = Math.max(R.hMax, r.honor);
    R.cMin = Math.min(R.cMin, r.cash);  R.cMax = Math.max(R.cMax, r.cash);
  }
  return R;
}
const qnorm = (v, min, max) => max <= min ? 0.5 : Math.round((v - min) / (max - min) * 24) / 24; // quantized 0..1
const ramp = (t, h0, h1) => `hsl(${(h0 + (h1 - h0) * t).toFixed(0)},72%,52%)`;
function colorOf(r, mode, R) {
  switch (mode) {
    case 'honor':  return ramp(qnorm(r.honor, R.hMin, R.hMax), 0, 120);   // red (low) -> green (high)
    case 'cash':   return ramp(qnorm(r.cash, R.cMin, R.cMax), 210, 0);    // blue (low) -> red (high)
    case 'combat': return (r.flags & 0x04) ? '#ff3b3b' : '#5a6b3a';
    default:       return (T[r.transport] || ['', '#fff'])[1];            // transport
  }
}
function renderLegend(mode, seenT, R) {
  const lg = document.getElementById('legend');
  if (mode === 'transport')
    lg.innerHTML = [...seenT].sort((a, b) => a - b).map(t => `<span><i style="background:${(T[t] || ['', '#fff'])[1]}"></i>${(T[t] || ['?'])[0]}</span>`).join('');
  else if (mode === 'combat')
    lg.innerHTML = `<span><i style="background:#ff3b3b"></i>in combat</span> <span><i style="background:#5a6b3a"></i>peaceful</span>`;
  else {
    const [lo, hi, h0, h1, label] = mode === 'honor' ? [R.hMin, R.hMax, 0, 120, 'honor']
      : [R.cMin, R.cMax, 210, 0, 'cash $'];
    const grad = `linear-gradient(to right, ${ramp(0, h0, h1)}, ${ramp(.5, h0, h1)}, ${ramp(1, h0, h1)})`;
    lg.innerHTML = `${label}: ${lo} <span style="display:inline-block;width:90px;height:11px;border-radius:2px;vertical-align:middle;background:${grad}"></span> ${hi}`;
  }
  lg.style.display = 'block';
}

// --- Map ----------------------------------------------------------------------
const mapBounds = L.latLngBounds(L.latLng(-144, 0), L.latLng(0, 176));
// Zoom control lives bottom-right: the default top-left spot sits under the #panel overlay.
const map = L.map('map', { crs: L.CRS.Simple, minZoom: 2, maxZoom: 7, zoomControl: false });
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://s.rsg.sc/sc/images/games/RDR2/map/game/{z}/{x}/{y}.jpg', {
  minZoom: 2, maxZoom: 7, bounds: mapBounds, noWrap: true,
  attribution: 'Map © <a href="https://www.rockstargames.com/">Rockstar Games</a>'
}).addTo(map);
map.setView([-72, 88], 3);
// The cartouche is part of the map "paper", not window chrome: its own pane above the trail
// (zIndex 640, below the replay pane at 650) so it pans and scales with the map like an
// engraved map cartouche would. Its own pane keeps the overlay-pane drop-shadow filter off it.
map.createPane('cartouche');
map.getPane('cartouche').style.zIndex = 640;
// The frame art is pre-recolored to the map's line colour (#ae987a) with alpha = ink intensity, and
// the text is drawn in the map's label colour (#4e473f) — so the cartouche already sits on the map's
// own warm-grey ramp. Plain alpha compositing (no multiply/opacity tricks) renders those exact hues.

let lastData = null, pathLayer = null, markerLayer = null, hoverPts = [];

// --- Binary parsing -----------------------------------------------------------
function parseBin(buf) {
  const dv = new DataView(buf);
  const magic = String.fromCharCode(dv.getUint8(0), dv.getUint8(1), dv.getUint8(2), dv.getUint8(3));
  if (magic !== 'R2GP') throw new Error('Not a Trail Marker file (bad magic "' + magic + '")');
  const version = dv.getUint16(4, true), recordSize = dv.getUint16(6, true);
  const recs = [];
  for (let off = 8; off + recordSize <= buf.byteLength; off += recordSize) {
    recs.push({
      t: dv.getUint32(off, true),
      x: dv.getInt16(off + 4, true) / 2, y: dv.getInt16(off + 6, true) / 2, z: dv.getInt16(off + 8, true) / 2,
      transport: dv.getUint8(off + 10), flags: dv.getUint8(off + 11),
      honor: dv.getInt8(off + 12), character: dv.getUint8(off + 13),
      cash: dv.getUint32(off + 14, true),
    });
  }
  return { version, recordSize, recs };
}

// --- Render: one polyline per transport-run, split across sessions ------------
// Records abandoned by a later savegame load: at each segment_start (a load/launch) with
// in-game time T, the contiguous run of prior records with time > T is the abandoned future.
// (Deaths also rewind time but carry no segment_start, so respawns are never orphaned.)
function computeOrphans(recs) {
  const orph = new Array(recs.length).fill(false);
  for (let i = 1; i < recs.length; i++) {
    if (recs[i].flags & F_SEGMENT_START) {
      const T = recs[i].t;
      for (let j = i - 1; j >= 0 && !orph[j]; j--) {
        if (recs[j].t > T) orph[j] = true; else break; // reached the branch point
      }
    }
  }
  return orph;
}

// Death locations, unified into one marker per death from two signals:
//  - F_DEAD: the exact spot the game reported dead/dying — best-effort, catches ~half of
//    deaths (the window is brief).
//  - respawn-rewind: in-game time jumps backward with NO segment_start. A reload also rewinds
//    time but carries a segment_start, so this excludes reloads; the spot is the last record
//    before the rewind.
// Most deaths respawn, so rewinds are the main list: we mark a nearby F_DEAD spot (exact) or
// fall back to the pre-rewind record (approximate). But a death with NO following respawn —
// you died then quit, or loaded an earlier save (masked as a reload) — leaves only its F_DEAD
// flag, so we also emit any dead flag the rewind pass didn't already claim. De-duped so a
// normal death isn't marked twice.
//
// Caveat the rewind signal alone can't resolve: a story mission that needs a particular time of
// day ALSO rewinds the clock backward (always to a round hour) with no segment_start — looks
// exactly like a respawn by the time jump. We separate the two with death evidence and two
// behavioural tells:
//   1. Movement. A death respawns you at a doctor/camp/checkpoint (a real position warp); a
//      stationary clock-set leaves you standing where you are. So a tiny move = a clock-set.
//   2. A sustained cutscene. A chapter-transition montage (e.g. the ride out of Colter into
//      Ch.2) rewinds the clock AND relocates you forward along the journey — so it warps, which
//      tell #1 alone would misread as a death. But it stays inside a long non-gameplay run,
//      whereas a real death hands control back to gameplay right after the respawn. So a rewind
//      whose landing sits in a run of >= CUTSCENE_RUN non-gameplay records is scripted, not a
//      death — even when it moved you a long way.
// We suppress only when there is NO death evidence (no F_DEAD in the dying-run window, no combat
// at the rewind) AND one of those tells holds. Any warp that lands back in gameplay is kept, so
// non-combat deaths (a fall, a train, drowning — all of which still respawn you elsewhere)
// survive. The cutscene flag is best-effort (it was inert in one older log); that's why it only
// ever adds suppressions on top of the movement test, never removes a death the other signals
// caught. Verified against real logs: clears RDR2's opening chapters (stationary clock-sets and
// the Ch.1->2 travel montage) with zero false deaths, while retaining every F_DEAD/combat/warp
// death in a separate 12-death session.
function computeDeaths(recs) {
  const out = [], claimed = new Set();
  for (let i = 1; i < recs.length; i++) {
    if (recs[i].flags & F_SEGMENT_START) continue;             // reload, not a death
    if (!(recs[i].t > 0) || recs[i].t >= recs[i - 1].t) continue; // need a backward time jump
    if (recs[i - 1].t - recs[i].t < 5) continue;              // ignore sub-sample jitter
    let k = -1;                                                // nearest F_DEAD before the rewind
    for (let j = i - 1; j >= 0 && j >= i - 6; j--)             // claim the whole dying-run in the window
      if (recs[j].flags & F_DEAD) { if (k < 0) k = j; claimed.add(j); }
    const combat = (recs[i - 1].flags & F_COMBAT) || (recs[i].flags & F_COMBAT);
    const moved = Math.hypot(recs[i].x - recs[i - 1].x, recs[i].y - recs[i - 1].y);
    let cutscene = true;                                       // landing inside a sustained cutscene?
    for (let j = i; j < i + CUTSCENE_RUN; j++) cutscene = cutscene && j < recs.length && (recs[j].flags & F_NONGAMEPLAY);
    if (k < 0 && !combat && (moved <= CLOCKSET_MAX_MOVE || cutscene)) continue; // scripted clock-set/montage, not a death
    out.push({ idx: k >= 0 ? k : i - 1, exact: k >= 0 });
  }
  // Unclaimed dead flags = deaths with no respawn after them. One marker per dying-run.
  for (let i = 0; i < recs.length; i++) {
    if (!(recs[i].flags & F_DEAD) || (i > 0 && (recs[i - 1].flags & F_DEAD))) continue; // run start only
    let claimedRun = false;
    for (let j = i; j < recs.length && (recs[j].flags & F_DEAD); j++) if (claimed.has(j)) { claimedRun = true; break; }
    if (!claimedRun) out.push({ idx: i, exact: true });
  }
  return out;
}

// --- Cartouche: an engraved map-credit block composed from the loaded file ----
// Placed in the empty NW margin, anchored to map coords so it scales/pans with the map.
// Text is derived entirely from the records (see KEEPSAKE_IDEAS.md): protagonist(s) ->
// title; total distance ridden; in-game year span (days for short runs); and the honor
// closing line (an arc when it shifts tiers, else a final-state phrase). Numbers are spelled
// in prose, figures kept for years; any line whose data is missing is simply omitted.
const CART_BOUNDS = L.latLngBounds([-79, 10], [-19, 55]); // SW,NE — ~3:4 to match the art, centred in the empty western margin
// top/bottom bracket the frame's clear interior opening (measured from the art: the rounded panel
// runs x 249–829, y 234–1234, centre x≈539); text is centred vertically between them. innerW is
// that opening (~580 wide) minus ~55px margins each side — the width every line is fitted to, kept
// clear of the beaded rule so even the long hero name reads with breathing room.
const CART = { imgW: 1086, imgH: 1448, cx: 539, top: 420, bottom: 1048, innerW: 490,
               ink: '#4e473f', font: "'Hoefler Text', Cochin, Baskerville, Georgia, 'Times New Roman', serif" };
const NAME = { 0: 'ARTHUR MORGAN', 1: 'JOHN MARSTON' };
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
const ONES = ['zero','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve',
  'thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
const TENS = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
function words999(n) {
  let s = '';
  if (n >= 100) { s += ONES[Math.floor(n / 100)] + ' hundred'; n %= 100; if (n) s += ' '; }
  if (n >= 20) { s += TENS[Math.floor(n / 10)]; n %= 10; if (n) s += '-' + ONES[n]; }
  else if (n > 0) s += ONES[n];
  return s;
}
function numWords(n) {
  n = Math.round(n);
  if (n <= 0) return 'zero';
  const th = Math.floor(n / 1000), rest = n % 1000;
  return ((th ? words999(th) + ' thousand' + (rest ? ' ' : '') : '') + (rest ? words999(rest) : '')).trim();
}
const roundMiles = n => n < 20 ? Math.round(n) : n < 100 ? Math.round(n / 5) * 5 : n < 1000 ? Math.round(n / 10) * 10 : Math.round(n / 100) * 100;
// Arthur (and John) begin the story as outlaws — that's the premise, so the keepsake takes the
// outlaw start as given and reads the closing line straight from the FINAL honor tier: the arc is
// always "from an outlaw to wherever he ended up". Elegiac frontier phrasing, prefixed "who " at use.
const HTIER = [
  { min: -1e9, fin: 'lived by the gun' },
  { min: -60,  fin: "never left the outlaw's road" },
  { min: -20,  fin: 'was part outlaw, part honest man' },
  { min: 20,   fin: 'rose from an outlaw to a better man' },
  { min: 60,   fin: 'rose from an outlaw to an honest man' },
];
const tierIdx = h => { let k = 0; for (let i = 0; i < HTIER.length; i++) if (h >= HTIER[i].min) k = i; return k; };
function cartoucheText(recs) {
  let minT = Infinity, maxT = -Infinity, endHonor = 0;
  let dist = 0, pgx = null, pgy = null, pgt = null;
  for (const r of recs) {
    if (r.t > 0) { if (r.t < minT) minT = r.t; if (r.t > maxT) maxT = r.t; }
    endHonor = r.honor; // final recorded honor — the endpoint of the arc (outlaw start is assumed)
    if (pgx !== null) {
      const cut = (r.flags & F_SEGMENT_START) || (pgt !== null && r.t < pgt) || Math.hypot(r.x - pgx, r.y - pgy) > TELEPORT_UNITS;
      if (!cut) dist += Math.hypot(r.x - pgx, r.y - pgy);
    }
    pgx = r.x; pgy = r.y; pgt = r.t;
  }
  // protagonists in first-appearance order (exclude 'other' = 2)
  const order = [];
  { const seen = {}; for (let i = 0; i < recs.length; i++) { const c = recs[i].character; if ((c === 0 || c === 1) && !seen[c]) { seen[c] = 1; order.push(c); } } }
  const names = order.length ? order.map(c => NAME[c]) : ['A DRIFTER'];
  const nameLines = names.length <= 1 ? [names[0]] : [names[0] + ' &', names.slice(1).join(' & ')];

  const body = [];
  const miles = dist / 1609.34;
  if (miles >= 1) body.push(cap(numWords(roundMiles(miles))) + ' miles');
  if (isFinite(minT)) {
    const y0 = civilFromDays(Math.floor(minT / 86400) + DAYS_1800)[0];
    const y1 = civilFromDays(Math.floor(maxT / 86400) + DAYS_1800)[0];
    const days = (maxT - minT) / 86400;
    if (y1 > y0) body.push('in the years ' + y0 + '–' + y1 + ',');
    else { if (days >= 1) body.push('over ' + numWords(days) + ' days,'); body.push('in the year ' + y0 + ','); }
  }
  body.push('who ' + HTIER[tierIdx(endHonor)].fin);
  return { titleSmall: 'THE TRAIL OF', nameLines, body };
}

const SVGNS = 'http://www.w3.org/2000/svg';
let cartoucheLayer = null;
function buildCartouche(recs) {
  if (cartoucheLayer) { map.removeLayer(cartoucheLayer); cartoucheLayer = null; }
  if (!recs || !recs.length) return;
  const info = cartoucheText(recs);
  const svg = document.createElementNS(SVGNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${CART.imgW} ${CART.imgH}`);
  const img = document.createElementNS(SVGNS, 'image');
  img.setAttribute('href', 'assets/cartouche.png');
  img.setAttributeNS('http://www.w3.org/1999/xlink', 'href', 'assets/cartouche.png'); // older renderers
  img.setAttribute('x', 0); img.setAttribute('y', 0);
  img.setAttribute('width', CART.imgW); img.setAttribute('height', CART.imgH);
  img.setAttribute('preserveAspectRatio', 'none'); // colour is baked into the PNG (duotone + alpha); no filter needed
  svg.appendChild(img);

  const rows = [];
  rows.push({ t: info.titleSmall, size: 48, ls: 8 });
  // ls/ws open the bold name up a touch: Hoefler's bold word-space is tiny at this size, so without
  // extra spacing "ARTHUR MORGAN" reads as one word. Both are absolute user units (survive shrink).
  for (const n of info.nameLines) rows.push({ t: n, size: 84, weight: '600', kind: 'name', ls: 1.5, ws: 11 });
  rows.push({ t: '— · —', size: 54, gapTop: 40, gap: 30 });
  info.body.forEach((b, i) => rows.push({ t: b, size: 54, style: i === info.body.length - 1 ? 'italic' : 'normal' }));

  const lh = 1.42;
  let totalH = 0;
  for (const r of rows) totalH += r.size * lh + (r.gapTop || 0) + (r.gap || 0);
  let y = (CART.top + CART.bottom) / 2 - totalH / 2;
  const nameNodes = [];
  for (const r of rows) {
    y += (r.gapTop || 0) + r.size * lh;
    const t = document.createElementNS(SVGNS, 'text');
    t.setAttribute('x', CART.cx); t.setAttribute('y', y - r.size * 0.32);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-family', CART.font); t.setAttribute('fill', CART.ink);
    t.setAttribute('font-size', r.size);
    if (r.ls) t.setAttribute('letter-spacing', r.ls);
    if (r.weight) t.setAttribute('font-weight', r.weight);
    if (r.style) t.setAttribute('font-style', r.style);
    t.textContent = r.t;
    svg.appendChild(t);
    if (r.kind === 'name') nameNodes.push(t);
    y += (r.gap || 0);
  }
  cartoucheLayer = L.svgOverlay(svg, CART_BOUNDS, { pane: 'cartouche', interactive: false }).addTo(map);
  // Fit every line inside the interior opening (CART.innerW). Prefer shrinking the type — down to
  // 78% — so glyphs stay their natural shape; only squeeze letter spacing (textLength) as a last
  // resort for a line still too long at the floor size.
  const fit = (t, floor) => {
    const nat = t.getComputedTextLength();
    if (nat <= CART.innerW) return;
    const fs = +t.getAttribute('font-size');
    const shrunk = Math.max(fs * floor, fs * CART.innerW / nat);
    if (shrunk < fs) t.setAttribute('font-size', shrunk);
    if (t.getComputedTextLength() > CART.innerW) {
      t.setAttribute('textLength', CART.innerW); t.setAttribute('lengthAdjust', 'spacingAndGlyphs');
    }
  };
  const fitAll = () => {
    // The name is the hero: size both name lines together off the widest one so they stay uniform.
    if (nameNodes.length) {
      const fs = +nameNodes[0].getAttribute('font-size');
      const widest = Math.max(...nameNodes.map(n => n.getComputedTextLength()));
      if (widest > CART.innerW) {
        const shared = Math.max(fs * 0.7, fs * CART.innerW / widest);
        nameNodes.forEach(n => n.setAttribute('font-size', shared));
      }
      nameNodes.forEach(n => fit(n, 0.7)); // still too wide (rare) → gentle squeeze
    }
    svg.querySelectorAll('text').forEach(t => { if (!nameNodes.includes(t)) fit(t, 0.78); });
  };
  // getComputedTextLength must measure against the *final* font, so wait until it's loaded — a
  // system serif like Hoefler Text still resolves to a fallback for the first paint or two, and
  // measuring then produces a nondeterministic (often over-shrunk or overflowing) fit. Preload the
  // exact faces we draw, then fit; bail if a newer render replaced this layer meanwhile.
  const mine = cartoucheLayer;
  if (document.fonts && document.fonts.load) {
    // Preload the exact faces we draw (single family per call — a comma-separated stack can fail to
    // parse and silently skip the wait), then also gate on the global fonts-ready signal, then fit.
    const faces = [];
    for (const sz of ['44px', '48px', '76px']) for (const pfx of ['', 'italic ', '600 ']) faces.push(`${pfx}${sz} "Hoefler Text"`);
    Promise.all(faces.map(f => document.fonts.load(f).catch(() => {}))).then(() => document.fonts.ready)
      .then(() => { if (cartoucheLayer === mine) fitAll(); });
  } else fitAll();
}

function render(data, doFit) {
  lastData = data;
  if (pathLayer) { map.removeLayer(pathLayer); pathLayer = null; }
  if (markerLayer) { map.removeLayer(markerLayer); markerLayer = null; }
  const { recs, version } = data;
  const mode = document.getElementById('colormode').value;
  const R = dataRanges(recs);
  const exCut = document.getElementById('f-cutscene').checked;
  const exMission = document.getElementById('f-mission').checked;
  const showJumps = !document.getElementById('f-teleport').checked;
  const orph = document.getElementById('f-orphan').checked ? computeOrphans(recs) : null;

  const lines = [], deaths = [], teleports = [];
  hoverPts = [];
  let run = [], runC = null, prevLL = null, pgx = null, pgy = null, pgt = null, kept = 0;
  // Contrast against light terrain comes from a single drop-shadow on the whole vector pane
  // (see CSS), so each run is just one polyline — no geometry doubling.
  const flush = () => { if (run.length > 1) lines.push(L.polyline(run, { color: runC, weight: 2.4, opacity: .95 })); };
  const seenT = new Set();
  for (let i = 0; i < recs.length; i++) {
    const r = recs[i];
    if ((exCut && (r.flags & 0x01)) || (exMission && (r.flags & F_MISSION)) || (orph && orph[i])) { flush(); run = []; runC = null; prevLL = null; pgx = null; pgt = null; continue; }
    const ll = gameToLatLng(r.x, r.y);
    const col = colorOf(r, mode, R);
    // A death respawn rewinds in-game time and warps you elsewhere — often a short hop the
    // spatial threshold misses. It isn't travel, so break the track there too and draw no
    // connector (the death marker already shows it), else we'd render a straight death->respawn line.
    const respawn = prevLL && pgt !== null && r.t < pgt && !(r.flags & F_SEGMENT_START);
    const teleport = prevLL && pgx !== null && Math.hypot(r.x - pgx, r.y - pgy) > TELEPORT_UNITS;
    if ((r.flags & F_SEGMENT_START) || teleport || respawn) {               // session boundary, fast-travel jump, or respawn
      flush();
      if (teleport && !respawn && showJumps) teleports.push(L.polyline([prevLL, ll], { color: '#9a9a9a', weight: 1, opacity: .5, dashArray: '4 7' }));
      run = [ll]; runC = col;
    } else if (col !== runC) { flush(); run = prevLL ? [prevLL, ll] : [ll]; runC = col; } // color change: connect
    else run.push(ll);
    hoverPts.push({ lat: ll[0], lng: ll[1], r, i });            // i = original record index, for replay event mapping
    prevLL = ll; pgx = r.x; pgy = r.y; pgt = r.t; seenT.add(r.transport); kept++;
  }
  flush();

  // Where each kept point landed in the replay sequence, keyed by original record index.
  const seqPos = new Map(); hoverPts.forEach((p, si) => seqPos.set(p.i, si));
  const events = []; // {pos, ll, kind, label} — markers the replay reveals as the playhead arrives

  // Death markers: exact (F_DEAD) drawn solid, inferred (respawn-rewind) hollow/dashed.
  for (const d of computeDeaths(recs)) {
    if ((exCut && (recs[d.idx].flags & 0x01)) || (exMission && (recs[d.idx].flags & F_MISSION)) || (orph && orph[d.idx])) continue; // hidden by a filter
    const ll = gameToLatLng(recs[d.idx].x, recs[d.idx].y);
    // Inferred spots (respawn-rewind, no dead flag) are normally within a sample of the real
    // death spot, so they share the exact marker's look; the tooltip keeps the distinction.
    const label = d.exact ? '💀 died here' : '💀 died here (approx)';
    deaths.push(L.circleMarker(ll, { radius: 6, color: '#ff3b3b', weight: 2, fillColor: '#7a0000', fillOpacity: .85 }).bindTooltip(label));
    if (seqPos.has(d.idx)) events.push({ pos: seqPos.get(d.idx), ll, kind: 'death', label });
  }
  pathLayer = L.layerGroup([...teleports, ...lines]).addTo(map);
  // Death markers live in their own layer so the replay can hide them and reveal them on arrival.
  markerLayer = L.layerGroup([...deaths]).addTo(map);

  buildCartouche(recs); // engraved map-credit block in the NW margin, composed from this file
  if (doFit && hoverPts.length) {
    const fb = L.latLngBounds(hoverPts.map(p => [p.lat, p.lng]));
    fb.extend(CART_BOUNDS); // frame the trail and the cartouche together, like a printed keepsake
    map.fitBounds(fb, { padding: [40, 40], maxZoom: 6 });
  }

  const sessions = recs.filter(r => r.flags & F_SEGMENT_START).length || (recs.length ? 1 : 0);
  document.getElementById('stats').innerHTML =
    `<b>${kept.toLocaleString()}</b>/${recs.length.toLocaleString()} pts · <b>${sessions}</b> session(s) · <b>${deaths.length}</b> 💀 · v${version}`;
  renderLegend(mode, seenT, R);
  initReplay(mode, R, events); // (re)arm the replay over the points kept by the current filters, colored to match
}

// --- Hover: show the nearest recorded point's details -------------------------
const CHARS = ['Arthur', 'John', 'other'];
const hoverBox = document.getElementById('hover');
let lastEvt = null, rafPending = false;
map.on('mousemove', e => { lastEvt = e; if (!rafPending) { rafPending = true; requestAnimationFrame(showHover); } });
map.on('mouseout', () => { hoverBox.style.display = 'none'; });
function showHover() {
  rafPending = false;
  if (!lastEvt || !hoverPts.length) return;
  const { lat, lng } = lastEvt.latlng;
  let best = null, bestD = Infinity;
  for (const p of hoverPts) { const dx = p.lng - lng, dy = p.lat - lat, d = dx * dx + dy * dy; if (d < bestD) { bestD = d; best = p; } }
  if (!best || map.latLngToContainerPoint([best.lat, best.lng]).distanceTo(lastEvt.containerPoint) > 18) {
    hoverBox.style.display = 'none'; return;
  }
  const r = best.r;
  hoverBox.innerHTML =
    `<b>${fmtTime(r.t)}</b><br>` +
    `${(T[r.transport] || ['?'])[0]} · honor ${r.honor} · $${r.cash}<br>` +
    `${CHARS[r.character] || 'char?'} · game (${r.x.toFixed(0)}, ${r.y.toFixed(0)})<br>` +
    `flags: ${flagNames(r.flags)}`;
  hoverBox.style.display = 'block';
  hoverBox.style.left = (lastEvt.containerPoint.x + 14) + 'px';
  hoverBox.style.top = (lastEvt.containerPoint.y + 14) + 'px';
}

// --- Replay -------------------------------------------------------------------
// Walks a marker along the recorded points in RECORDING ORDER (not by the in-game clock, which
// freezes in cutscenes, leaps hours at mission skips, and steps backward at scripted clock-sets).
// The points are reused straight from hoverPts, so the replay honours the same filters as the
// track (hidden cutscenes, hidden post-reload branches). A "scene cut" between two points — a
// backward time jump, a session start, or a fast-travel-sized hop — just teleports the marker and
// breaks the trail behind it, exactly like the static track.
const rp = { seq: [], idx: 0, playing: false, marker: null, trail: null, raf: 0, last: 0,
             mode: 'transport', R: null, drawn: -1, line: null, lineCol: null,
             dist: [0], elapsed: [0], trans: [0], events: [], staticHidden: false };
const rpEl = {
  bar: document.getElementById('replay'), play: document.getElementById('rp-play'),
  scrub: document.getElementById('rp-scrub'), speed: document.getElementById('rp-speed'),
  clock: document.getElementById('rp-clock'),
};
map.createPane('replay'); map.getPane('replay').style.zIndex = 650; // above the static track's overlay pane
const rpIsCut = (a, b) => b.r.t < a.r.t || (b.r.flags & F_SEGMENT_START) || Math.hypot(b.r.x - a.r.x, b.r.y - a.r.y) > TELEPORT_UNITS;
const rpFmtDist = u => u >= 1000 ? `${(u / 1000).toFixed(1)} km` : `${Math.round(u)} m`; // game units ~ metres
function rpFmtDur(s) { const d = Math.floor(s / 86400), h = Math.floor(s % 86400 / 3600), m = Math.floor(s % 3600 / 60);
  return d ? `${d}d ${h}h` : h ? `${h}h ${m}m` : `${m}m`; }
const rpEVENT_STYLE = {
  death: { radius: 6, color: '#ff3b3b', weight: 2, fillColor: '#7a0000', fillOpacity: .85, pane: 'replay' },
};
// Grow the trail point-by-point in the active color mode: extend the current run, or start a new
// colored polyline on a color change (connected) or a scene cut (broken). Forward steps append;
// a backward scrub rebuilds from the start (rare, so the O(n) redraw is fine).
function rpResetTrail() { rp.trail.clearLayers(); rp.drawn = -1; rp.line = null; rp.lineCol = null; }
function rpExtendTo(i) {
  if (i < rp.drawn) rpResetTrail();
  for (let j = rp.drawn + 1; j <= i; j++) {
    const p = rp.seq[j], ll = [p.lat, p.lng], col = colorOf(p.r, rp.mode, rp.R);
    const cut = j > 0 && rpIsCut(rp.seq[j - 1], rp.seq[j]);
    if (!rp.line || cut || col !== rp.lineCol) {
      const start = (!cut && j > 0) ? [[rp.seq[j - 1].lat, rp.seq[j - 1].lng], ll] : [ll]; // connect across color change
      rp.line = L.polyline(start, { color: col, weight: 3.4, opacity: .98, pane: 'replay' }).addTo(rp.trail);
      rp.lineCol = col;
    } else rp.line.addLatLng(ll);
  }
  rp.drawn = i;
}
// Reveal the death markers as the playhead reaches them (and re-hide on rewind).
// While a replay is "active" we hide the static marker layer so upcoming deaths aren't spoiled;
// when parked at the very start we show the static markers and clear the revealed ones.
function rpReveal(i, active) {
  if (active && markerLayer && !rp.staticHidden) { map.removeLayer(markerLayer); rp.staticHidden = true; }
  if (!active && markerLayer && rp.staticHidden) { markerLayer.addTo(map); rp.staticHidden = false; }
  for (const e of rp.events) {
    const want = active && e.pos <= i;
    if (want && !e.shown) {
      e.marker.addTo(map); e.shown = true;
      e.marker.setRadius(11); setTimeout(() => e.marker && e.marker.setRadius(rpEVENT_STYLE[e.kind].radius), 160); // pop
    } else if (!want && e.shown) { map.removeLayer(e.marker); e.shown = false; }
  }
}
function rpDraw() {
  const i = Math.min(Math.round(rp.idx), rp.seq.length - 1);
  if (i < 0) return;
  const p = rp.seq[i], ll = [p.lat, p.lng], r = p.r;
  rpExtendTo(i);
  rp.marker.setLatLng(ll).setStyle({ fillColor: colorOf(r, rp.mode, rp.R) }); // playhead shows the current color value
  rpEl.scrub.value = i;
  const active = rp.playing || i > 0;
  rp.marker.setStyle({ opacity: active ? 1 : 0, fillOpacity: active ? 1 : 0 }); // hide the playhead at rest for a clean, marker-free keepsake view
  rpEl.clock.innerHTML =
    `<b>${fmtTime(r.t)}</b><br>` +
    `<span class="sub">${(T[r.transport] || ['?'])[0]} · honor ${r.honor} · $${r.cash} · ${CHARS[r.character] || '?'}</span><br>` +
    `<span class="sub">~${rpFmtDist(rp.dist[i])} · ${rpFmtDur(rp.elapsed[i])} in-game · ${rp.trans[i]} transitions</span>`;
  rpReveal(i, active);
  map.getContainer().classList.toggle('replaying', active); // fade static track once under way
  if (rp.playing && !map.getBounds().pad(-0.12).contains(ll)) map.panTo(ll, { animate: true, duration: .4 });
}
function rpTick(now) {
  if (!rp.playing) return;
  const dt = (now - rp.last) / 1000; rp.last = now;
  rp.idx += (+rpEl.speed.value) * Math.min(dt, .1); // points/sec; clamp dt so a tab-switch can't skip ahead
  if (rp.idx >= rp.seq.length - 1) { rp.idx = rp.seq.length - 1; rpDraw(); rpPause(); return; }
  rpDraw();
  rp.raf = requestAnimationFrame(rpTick);
}
function rpPlay() {
  if (rp.seq.length < 2) return;
  if (rp.idx >= rp.seq.length - 1) { rp.idx = 0; rpResetTrail(); } // restart from the top if parked at the end
  rp.playing = true; rpEl.play.textContent = '⏸'; rp.last = performance.now();
  rp.raf = requestAnimationFrame(rpTick);
}
function rpPause() { rp.playing = false; rpEl.play.textContent = '▶'; cancelAnimationFrame(rp.raf); }
function initReplay(mode, R, events) {
  rpPause();
  const prevIdx = rp.idx, prevLen = rp.seq.length;
  rp.seq = hoverPts.slice(); rp.mode = mode; rp.R = R;
  if (rp.trail) { map.removeLayer(rp.trail); rp.trail = null; }
  if (rp.marker) { map.removeLayer(rp.marker); rp.marker = null; }
  for (const e of rp.events) if (e.shown) map.removeLayer(e.marker); // clear any revealed markers from the prior render
  rp.events = []; rp.staticHidden = false;
  if (rp.seq.length < 2) { rp.idx = 0; rpEl.bar.classList.remove('show'); map.getContainer().classList.remove('replaying'); return; }
  // Cumulative trip stats per point: distance ridden, "lived" in-game time (mission skips excluded),
  // and transport changes. Precomputed once so playback just indexes them.
  rp.dist = [0]; rp.elapsed = [0]; rp.trans = [0];
  for (let i = 1; i < rp.seq.length; i++) {
    const a = rp.seq[i - 1], b = rp.seq[i], cut = rpIsCut(a, b), dt = b.r.t - a.r.t;
    rp.dist[i]    = rp.dist[i - 1]    + (cut ? 0 : Math.hypot(b.r.x - a.r.x, b.r.y - a.r.y));
    rp.elapsed[i] = rp.elapsed[i - 1] + (!cut && dt > 0 && dt <= TRIP_TIME_CAP ? dt : 0);
    rp.trans[i]   = rp.trans[i - 1]   + (!cut && b.r.transport !== a.r.transport ? 1 : 0);
  }
  rp.events = (events || []).map(e => ({ ...e, shown: false, marker: L.circleMarker(e.ll, rpEVENT_STYLE[e.kind]).bindTooltip(e.label) }));
  // Keep your spot when only the color mode/filters changed the styling, not the point count.
  rp.idx = (prevLen === rp.seq.length) ? Math.min(prevIdx, rp.seq.length - 1) : 0;
  rp.trail = L.layerGroup().addTo(map); rpResetTrail();
  rp.marker = L.circleMarker([rp.seq[0].lat, rp.seq[0].lng],
    { radius: 7, color: '#fff', weight: 2, fillColor: '#e8c25a', fillOpacity: 1, pane: 'replay' }).addTo(map);
  rpEl.scrub.max = rp.seq.length - 1;
  rpEl.bar.classList.add('show');
  rpDraw();
}
rpEl.play.addEventListener('click', () => rp.playing ? rpPause() : rpPlay());
rpEl.scrub.addEventListener('input', () => { rpPause(); rp.idx = +rpEl.scrub.value; rpDraw(); });
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && rpEl.bar.classList.contains('show') && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
    e.preventDefault(); rp.playing ? rpPause() : rpPlay();
  }
});

// --- File loading -------------------------------------------------------------
function loadFile(file) {
  const fr = new FileReader();
  fr.onload = () => {
    try { render(parseBin(fr.result), true); document.getElementById('sample-note').style.display = 'none'; }
    catch (e) { alert(e.message); }
  };
  fr.readAsArrayBuffer(file);
}
document.getElementById('file').addEventListener('change', e => e.target.files[0] && loadFile(e.target.files[0]));
['colormode', 'f-cutscene', 'f-mission', 'f-orphan', 'f-teleport'].forEach(id =>
  document.getElementById(id).addEventListener('change', () => { if (lastData) render(lastData, false); }));
const drop = document.getElementById('drop');
window.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('show'); });
window.addEventListener('dragleave', e => { if (e.clientX <= 0 || e.clientY <= 0) drop.classList.remove('show'); });
window.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('show'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

// Show the bundled sample on load so a first-time visitor sees a trail immediately.
// Best-effort: fetch fails for file:// in most browsers, so we just leave the empty
// map (and the drag-to-load prompt) in that case.
fetch('TrailMarker.bin')
  .then(r => { if (!r.ok) throw new Error('no sample'); return r.arrayBuffer(); })
  .then(buf => { render(parseBin(buf), true); document.getElementById('sample-note').style.display = ''; })
  .catch(() => {});
</script>
</body>
</html>
